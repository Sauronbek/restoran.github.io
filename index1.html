<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой сайт</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#f4f4f4;
        color:#333;
    }

    header{
        background:#222;
        color:white;
        padding:20px;
        text-align:center;
    }

    nav{
        background:#444;
        padding:10px;
        text-align:center;
    }

    nav a{
        color:white;
        text-decoration:none;
        margin:0 15px;
    }

    .main{
        padding:40px;
        text-align:center;
    }

    .card{
        background:white;
        width:300px;
        margin:20px auto;
        padding:20px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    footer{
        background:#222;
        color:white;
        text-align:center;
        padding:15px;
        margin-top:30px;
    }
</style>
</head>

<body>

<header>
    <h1>Мой первый сайт</h1>
    <p>Простой сайт на HTML и CSS</p>
</header>

<nav>
    <a href="#">Главная</a>
    <a href="#">О нас</a>
    <a href="#">Контакты</a>
</nav>

<div class="main">
    <h2>Добро пожаловать</h2>
    <p>Это лёгкий и простой сайт.</p>

    <div class="card">
        <h3>Карточка</h3>
        <p>Тут можно написать любой текст.</p>
    </div>
</div>

<footer>
    <p>2026 © Мой сайт</p>
</footer>

</body>
</html>
